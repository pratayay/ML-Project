version: "3.9"

services:
  api:
    image: python:3.11-slim
    working_dir: /app
    volumes:
      - ../:/app
    command:
      - sh
      - -c
      - pip install --no-cache-dir fastapi uvicorn && uvicorn adaptiveguard.api.main:app --host 0.0.0.0 --port 8000
    healthcheck:
      test:
        - CMD-SHELL
        - python -c "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    ports:
      - "8000:8000"

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: adaptiveguard
      POSTGRES_USER: adaptiveguard
      POSTGRES_PASSWORD: adaptiveguard
    ports:
      - "5432:5432"

  dashboard:
    image: node:20-alpine
    working_dir: /app
    command: ["sh", "-c", "echo 'dashboard placeholder'; tail -f /dev/null"]
    ports:
      - "3000:3000"
